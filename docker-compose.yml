  #     - RABBITMQ_PASSWORD=guest
  #     - MINIO_HOST=minio
  #     - MINIO_PORT=9000
  #     - MINIO_ACCESS_KEY=admin
  #     - MINIO_SECRET_KEY=admin123
  #   networks:
  #     - bitirme-net

  # llm:
  #   build:
  #     context: .
  #     dockerfile: llm/Dockerfile
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]
  #   environment:
  #     - ORCHESTRATOR_HOST=orchestrator
  #     - ORCHESTRATOR_PORT=50051
