services:
  orchestrator:
    build:
      context: .
      dockerfile: orchestrator/Dockerfile
    container_name: orchestrator
    image: orchestrator
    ports:
      - "50051:50051"
    environment:
      - GRPC_PORT=50051
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=guest
      - RABBITMQ_PASSWORD=guest
    depends_on:
      - rabbitmq
    networks:
      - bitirme-net

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    networks:
      - bitirme-net

  crawler:
    build:
      context: .
      dockerfile: crawler/Dockerfile
    container_name: crawler
    image: crawler
    depends_on:
      - orchestrator
    environment:
      - ORCHESTRATOR_HOST=orchestrator
      - ORCHESTRATOR_PORT=50051
      - CRAWLER_GRPC_PORT=50052
      - CRAWLER_DEMO_MODE=false
    networks:
      - bitirme-net

  db:
    build:
      context: .
      dockerfile: db/Dockerfile
    container_name: db
    image: db
    depends_on:
      - orchestrator
      - rabbitmq
      - postgres
      - minio
    ports:
      - "50053:50053"
      # Expose Postgres/MinIO for local external tools if needed
      # - "5432:5432"
      # - "9000:9000"
    environment:
      - ORCHESTRATOR_HOST=orchestrator
      - ORCHESTRATOR_PORT=50051
      - PUBLIC_HOST=db
      - PUBLIC_PORT=50053
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=guest
      - RABBITMQ_PASSWORD=guest
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=news_db
      - POSTGRES_USER=news_user
      - POSTGRES_PASSWORD=news_password
      - MINIO_HOST=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=admin123
      - MINIO_BUCKET=news-media
    networks:
      - bitirme-net

  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=news_db
      - POSTGRES_USER=news_user
      - POSTGRES_PASSWORD=news_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - bitirme-net

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=admin123
    volumes:
      - minio-data:/data
    networks:
      - bitirme-net

  # VLM and LLM are commented out by default due to size/GPU requirements
  # Uncomment to build/run them locally (requires NVIDIA Container Toolkit)
  # vlm:
  #   build:
  #     context: .
  #     dockerfile: vlm/Dockerfile
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]
  #   environment:
  #     - ORCHESTRATOR_HOST=orchestrator
  #     - ORCHESTRATOR_PORT=50051
