  #     - PUBLIC_PORT=50055
  #     - RABBITMQ_HOST=rabbitmq
  #     - RABBITMQ_PORT=5672
  #     - RABBITMQ_USER=guest
  #     - RABBITMQ_PASSWORD=guest
  #   networks:
  #     - bitirme-net

  cua:
    build:
      context: .
      dockerfile: cua/Dockerfile
    container_name: cua-node
    depends_on:
      - orchestrator
      - rabbitmq
    environment:
      - ORCHESTRATOR_HOST=orchestrator
      - ORCHESTRATOR_PORT=50051
      - CUA_GRPC_PORT=50054
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=guest
      - RABBITMQ_PASSWORD=guest
      - MODEL_MODE=local
      - LMSTUDIO_URL=http://172.17.0.1:8000/v1  # Vast.ai host makinesindeki vLLM'e bağlanır
      - BROWSER_HEADLESS=true
      - CUA_HEALTH_FILE=/tmp/cua_health.json
      - CUA_REQUIRE_ORCHESTRATOR=true
    shm_size: '2gb'  # KRİTİK: Playwright'ın Docker içinde RAM taşmasından çökmemesi için
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - bitirme-net
    ports:
      - "50054:50054"
    healthcheck:
      test: ["CMD", "python", "-m", "cua.healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  bitirme-net:
    driver: bridge

volumes:
  postgres-data:
  minio-data:
