version: '3.8'

services:
  orchestrator:
    build:
      context: .
      dockerfile: orchestrator/Dockerfile
    container_name: orchestrator
    image: orchestrator
    ports:
      - "50051:50051"
    environment:
      - GRPC_PORT=50051
      - RABBITMQ_AVAILABLE=false
    networks:
      - bitirme-net

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    networks:
      - bitirme-net

  crawler:
    build:
      context: .
      dockerfile: crawler/Dockerfile
    container_name: crawler
    image: crawler
    depends_on:
      - orchestrator
    environment:
      - ORCHESTRATOR_HOST=orchestrator
      - ORCHESTRATOR_PORT=50051
      - CRAWLER_GRPC_PORT=50052
      - CRAWLER_DEMO_MODE=false
    networks:
      - bitirme-net

  db:
    build:
      context: .
      dockerfile: db/Dockerfile
    container_name: db
    image: db
    depends_on:
      - orchestrator
    ports:
      - "50053:50053"
      # Expose Postgres/MinIO for local external tools if needed
      # - "5432:5432"
      # - "9000:9000"
    environment:
      - ORCHESTRATOR_HOST=orchestrator
      - ORCHESTRATOR_PORT=50051
      - POSTGRES_HOST=localhost # In-container postgres
      - POSTGRES_PORT=5432
      - MINIO_HOST=localhost # In-container minio
      - MINIO_PORT=9000
    networks:
      - bitirme-net
  # VLM and LLM are commented out by default due to size/GPU requirements
  # Uncomment to build/run them locally (requires NVIDIA Container Toolkit)
  # vlm:
  #   build:
  #     context: .
  #     dockerfile: vlm/Dockerfile
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]
  #   environment:
  #     - ORCHESTRATOR_HOST=orchestrator
  #   networks:
  #     - bitirme-net

  # llm:
  #   build:
  #     context: .
  #     dockerfile: llm/Dockerfile
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]
  #   environment:
  #     - ORCHESTRATOR_HOST=orchestrator
  #   networks:
  #     - bitirme-net

  cua:
    build:
      context: .
      dockerfile: cua/Dockerfile
    container_name: cua-node
    depends_on:
      - orchestrator
      - rabbitmq
    environment:
      - ORCHESTRATOR_HOST=orchestrator
      - ORCHESTRATOR_PORT=50051
      - CUA_GRPC_PORT=50054
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=guest
      - RABBITMQ_PASSWORD=guest
      - MODEL_MODE=local
      - LMSTUDIO_URL=http://172.17.0.1:8000/v1  # Vast.ai host makinesindeki vLLM'e bağlanır
      - BROWSER_HEADLESS=true
      - CUA_HEALTH_FILE=/tmp/cua_health.json
      - CUA_REQUIRE_ORCHESTRATOR=true
    shm_size: '2gb'  # KRİTİK: Playwright'ın Docker içinde RAM taşmasından çökmemesi için
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - bitirme-net
    ports:
      - "50054:50054"
    healthcheck:
      test: ["CMD", "python", "-m", "cua.healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  bitirme-net:
    driver: bridge
